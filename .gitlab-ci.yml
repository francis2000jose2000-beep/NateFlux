stages:
  - validate
  - build_and_push
  - tf_plan
  - deploy
  - test
  - scan

scan-job:
  stage: test
  script:
    - echo "Security scan initiated for $TARGET_REPO_URL"

terraform-run:
  stage: deploy
  image: hashicorp/terraform:latest
  script:
    - terraform init
    - terraform plan
  environment:
    name: production

terraform_trigger:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Triggering HCP Terraform run for Workspace $TFC_WORKSPACE_ID"

security_scan:
  stage: scan
  image: alpine:latest
  script:
    - echo "Initiating DevSecOps Scan for $TARGET_REPO_URL"
    - echo "Running vulnerability check..."
    - sleep 5
    - echo "Scan complete. No high-risk vulnerabilities found."



variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375
  IMAGE_TAG: ${CI_COMMIT_SHA}
  TF_DIR: infrastructure/terraform
  TF_IN_AUTOMATION: "true"
  # Authentication token for HCP Terraform (TFE)
  TF_TOKEN_app_terraform_io: ${TF_TOKEN_app_terraform_io}
  # Terraform variables mapped from CI/CD variables
  TF_VAR_tenancy_ocid: ${OCI_TENANCY_OCID}
  TF_VAR_user_ocid: ${OCI_USER_OCID}
  TF_VAR_region: ${OCI_REGION}
  TF_VAR_compartment_ocid: ${OCI_COMPARTMENT_OCID}
  TF_VAR_ocir_region_key: ${OCI_REGION_KEY}
  TF_VAR_compartment_name: ${OCI_COMPARTMENT_NAME}

default:
  interruptible: true

validate_node:
  stage: validate
  image: node:20-bullseye
  script:
    - npm ci
    - npm run lint
    - npm test

validate_terraform:
  stage: validate
  image: hashicorp/terraform:1.7
  script:
    - cd "$TF_DIR"
    - terraform fmt -check -recursive
    - terraform init -backend=false
    - terraform validate

build_and_push:
  stage: build_and_push
  image: container-registry.oracle.com/os/oraclelinux:8
  services:
    - name: docker:24-dind
      command: ["--tls=false"]
  before_script:
    - dnf -y install docker-cli ca-certificates curl git-core openssl
    - docker version
    - echo "$OCIR_AUTH_TOKEN" | docker login "$OCIR_REGISTRY" -u "$OCIR_USERNAME" --password-stdin
    - docker buildx version || true
    - docker buildx create --use || docker buildx use default
    - docker run --privileged --rm tonistiigi/binfmt --install arm64
  script:
    - docker buildx build --platform linux/arm64 -t "$OCIR_REGISTRY/$OCIR_REPOSITORY:$IMAGE_TAG" -t "$OCIR_REGISTRY/$OCIR_REPOSITORY:latest" --push .
  rules:
    - if: $OCIR_REGISTRY && $OCIR_REPOSITORY && $OCIR_USERNAME && $OCIR_AUTH_TOKEN
      when: on_success
    - when: never

tf_plan:
  stage: tf_plan
  image: container-registry.oracle.com/os/oraclelinux:8
  id_tokens:
    OCI_ID_TOKEN:
      aud: https://gitlab.com
  before_script:
    - dnf -y install ca-certificates curl unzip python3 python3-pip openssl
    - pip3 install --no-cache-dir oci-cli
    - curl -fsSL -o /tmp/terraform.zip "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION:-1.7.5}/terraform_${TERRAFORM_VERSION:-1.7.5}_linux_amd64.zip"
    - unzip -o /tmp/terraform.zip -d /usr/local/bin
    - terraform version
    - mkdir -p ~/.oci
    - openssl genrsa -out ~/.oci/oci_api_key.pem 2048
    - chmod 600 ~/.oci/oci_api_key.pem
    - openssl rsa -pubout -in ~/.oci/oci_api_key.pem -out ~/.oci/oci_api_key_public.pem
    - export BASIC_AUTH="$(printf "%s:%s" "$OCI_IDCS_CLIENT_ID" "$OCI_IDCS_CLIENT_SECRET" | base64 -w0)"
    - export OCI_TOKEN=$(curl -sS --location "$OCI_IDCS_ENDPOINT/oauth2/v1/token" \
        --header "Content-Type: application/x-www-form-urlencoded" \
        --header "Authorization: Basic $BASIC_AUTH" \
        --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
        --data-urlencode "requested_token_type=urn:oci:token-type:oci-upst" \
        --data-urlencode "subject_token=$OCI_ID_TOKEN" \
        --data-urlencode "subject_token_type=jwt" \
        --data-urlencode "public_key@$HOME/.oci/oci_api_key_public.pem" \
      | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
    - echo "$OCI_TOKEN" > ~/.oci/token
    - echo "[DEFAULT]" > ~/.oci/config
    - echo "tenancy=${OCI_TENANCY_OCID}" >> ~/.oci/config
    - echo "region=${OCI_REGION}" >> ~/.oci/config
    - echo "security_token_file=~/.oci/token" >> ~/.oci/config
    - echo "authentication_type=security_token" >> ~/.oci/config
    - echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
    - export OCI_CLI_CONFIG_FILE=~/.oci/config
    - export OCI_CLI_AUTH=security_token
    - oci iam region list --limit 1 >/dev/null
    - export TF_VAR_oci_token="$OCI_TOKEN"
    - export TF_VAR_oci_private_key=$(cat ~/.oci/oci_api_key.pem)
    - cd "$TF_DIR"
    - terraform init
  script:
    - terraform plan
  rules:
    - if: $OCI_IDCS_ENDPOINT && $OCI_IDCS_CLIENT_ID && $OCI_IDCS_CLIENT_SECRET && $OCI_TENANCY_OCID && $OCI_USER_OCID && $OCI_REGION
      when: on_success
    - when: never

deploy:
  stage: deploy
  image: container-registry.oracle.com/os/oraclelinux:8
  id_tokens:
    OCI_ID_TOKEN:
      aud: https://gitlab.com
  before_script:
    - dnf -y install ca-certificates curl unzip python3 python3-pip openssl
    - pip3 install --no-cache-dir oci-cli
    - curl -fsSL -o /tmp/terraform.zip "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION:-1.7.5}/terraform_${TERRAFORM_VERSION:-1.7.5}_linux_amd64.zip"
    - unzip -o /tmp/terraform.zip -d /usr/local/bin
    - terraform version
    - mkdir -p ~/.oci
    - openssl genrsa -out ~/.oci/oci_api_key.pem 2048
    - chmod 600 ~/.oci/oci_api_key.pem
    - openssl rsa -pubout -in ~/.oci/oci_api_key.pem -out ~/.oci/oci_api_key_public.pem
    - export BASIC_AUTH="$(printf "%s:%s" "$OCI_IDCS_CLIENT_ID" "$OCI_IDCS_CLIENT_SECRET" | base64 -w0)"
    - export OCI_TOKEN=$(curl -sS --location "$OCI_IDCS_ENDPOINT/oauth2/v1/token" \
        --header "Content-Type: application/x-www-form-urlencoded" \
        --header "Authorization: Basic $BASIC_AUTH" \
        --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
        --data-urlencode "requested_token_type=urn:oci:token-type:oci-upst" \
        --data-urlencode "subject_token=$OCI_ID_TOKEN" \
        --data-urlencode "subject_token_type=jwt" \
        --data-urlencode "public_key@$HOME/.oci/oci_api_key_public.pem" \
      | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
    - echo "$OCI_TOKEN" > ~/.oci/token
    - echo "[DEFAULT]" > ~/.oci/config
    - echo "tenancy=${OCI_TENANCY_OCID}" >> ~/.oci/config
    - echo "region=${OCI_REGION}" >> ~/.oci/config
    - echo "security_token_file=~/.oci/token" >> ~/.oci/config
    - echo "authentication_type=security_token" >> ~/.oci/config
    - echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
    - export OCI_CLI_CONFIG_FILE=~/.oci/config
    - export OCI_CLI_AUTH=security_token
    - oci iam region list --limit 1 >/dev/null
    - export TF_VAR_oci_token="$OCI_TOKEN"
    - export TF_VAR_oci_private_key=$(cat ~/.oci/oci_api_key.pem)
    - cd "$TF_DIR"
    - terraform init
  script:
    - terraform apply -auto-approve
    - echo "PUBLIC_IP=$(terraform output -raw public_ip)" > deploy.env
  artifacts:
    reports:
      dotenv: "$TF_DIR/deploy.env"
  environment:
    name: production
    url: http://$PUBLIC_IP
  when: manual
  allow_failure: false
  rules:
    - if: $OCI_IDCS_ENDPOINT && $OCI_IDCS_CLIENT_ID && $OCI_IDCS_CLIENT_SECRET && $OCI_TENANCY_OCID && $OCI_USER_OCID && $OCI_REGION
      when: manual
    - when: never

# This job runs the Sentinel tests against an external repo
scan_external_repo:
  stage: test
  image: hashicorp/sentinel:latest
  # Only run this job if triggered by an API call with a target URL
  rules:
    - if: $TARGET_REPO_URL
  before_script:
    - apk add --no-cache git
  script:
    - echo "Scanning external repository: $TARGET_REPO_URL"
    - git clone --depth 1 $TARGET_REPO_URL ./external-target
    # Run sentinel against the cloned directory
    - sentinel test -verbose ./policies/...

